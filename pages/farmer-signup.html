<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Sign Up – FreshFetch</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="page auth-page farmer-auth active">
  <div class="auth-card">
    <button class="back-btn" onclick="location.href='farmer-login.html'">← Back</button>
    <div class="auth-logo">
      <div class="auth-logo-icon"><img src="../images/logo.png" onerror="this.parentElement.innerHTML='🌾'"></div>
      <div class="auth-logo-text">FreshFetch</div>
    </div>
    <div class="auth-title">Register your farm 🌱</div>
    <div class="auth-sub">List your crops and reach buyers across Uganda</div>
    <div id="fs-error" class="error-msg"></div>
    <div class="avatar-upload-wrap">
      <div class="avatar-preview" id="fs-avatar-preview" onclick="document.getElementById('fs-avatar-file').click()">📷</div>
      <div>
        <div class="avatar-upload-label"><span>Upload your photo</span> (optional)</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px;">Tap the circle to upload</div>
      </div>
      <input type="file" id="fs-avatar-file" accept="image/*" onchange="previewAvatar('fs-avatar-preview','fs-avatar-file')">
    </div>
    <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="fs-name" type="text" placeholder="e.g. John Ssekandi"></div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="input-prefix"><span class="prefix-label">+256</span><input type="tel" id="fs-phone" placeholder="700 000 000" maxlength="9"></div>
    </div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="fs-pass" type="password" placeholder="Create a strong password (min 6 chars)"></div>
    <div class="form-group"><label class="form-label">Farm Location / District</label><input class="form-input" id="fs-loc" type="text" placeholder="e.g. Masaka, Central Uganda"></div>
    <button class="btn-primary" id="fs-btn" onclick="signupFarmer()">Register as Farmer</button>
    <div class="auth-switch">Already registered? <a href="farmer-login.html">Log in</a></div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
applyTheme();

async function signupFarmer() {
  const name = val(document.getElementById('fs-name').value);
  const rawPhone = document.getElementById('fs-phone').value.trim();
  const pass = document.getElementById('fs-pass').value;
  const loc = val(document.getElementById('fs-loc').value);
  if (!name || !rawPhone || !pass || !loc) { showErr('fs-error', 'Please fill in all fields'); return; }
  if (pass.length < 6) { showErr('fs-error', 'Password must be at least 6 characters'); return; }
  if (!/^\d{9}$/.test(rawPhone.replace(/\s/g,''))) { showErr('fs-error', 'Enter a valid 9-digit phone number'); return; }
  setLoading('fs-btn', true, 'Register as Farmer');
  const email = rawPhone.replace(/\s/g,'') + '@farmer.freshfetch.ug';
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) { setLoading('fs-btn', false, 'Register as Farmer'); showErr('fs-error', error.message); return; }
  let avatar_url = null;
  const avatarFile = document.getElementById('fs-avatar-file').files[0];
  if (avatarFile) {
    try { avatar_url = await uploadFile('avatars', `farmers/${data.user.id}`, avatarFile); } catch(e) {}
  }
  await sb.from('profiles').upsert({
    id: data.user.id, name, phone: rawPhone.replace(/\s/g,''), location: loc,
    role: 'farmer', avatar_url, status: 'active', created_at: new Date().toISOString()
  });
  setLoading('fs-btn', false, 'Register as Farmer');
  window.location.href = 'farmer-dashboard.html';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}
function setLoading(btnId, on, originalText) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Please wait…' : originalText;
}
</script>
<div id="toast" class="toast"></div>
</body>
</html>
