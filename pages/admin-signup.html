<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Admin – FreshFetch</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="page auth-page active">
  <div class="auth-card">
    <button class="back-btn" onclick="location.href='admin-login.html'">← Back</button>
    <div class="auth-logo">
      <div class="auth-logo-icon" style="background:linear-gradient(135deg,#7c3aed,#a78bfa)"><span>🔐</span></div>
      <div class="auth-logo-text" style="background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Admin Portal</div>
    </div>
    <div class="auth-title">Create Admin Account</div>
    <div class="auth-sub">Set up your FreshFetch admin access</div>
    <div id="as-error" class="error-msg"></div>
    <div class="avatar-upload-wrap">
      <div class="avatar-preview" id="as-avatar-preview" style="background:linear-gradient(135deg,#7c3aed,#a78bfa)" onclick="document.getElementById('as-avatar-file').click()">📷</div>
      <div><div class="avatar-upload-label"><span>Upload admin photo</span></div></div>
      <input type="file" id="as-avatar-file" accept="image/*" onchange="previewAvatar('as-avatar-preview','as-avatar-file')">
    </div>
    <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="as-name" type="text" placeholder="Admin Name"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="as-email" type="email" placeholder="admin@freshfetch.ug"></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="as-pass" type="password" placeholder="Strong password (min 6 chars)"></div>
    <button class="btn-primary purple" id="as-btn" onclick="signupAdmin()">Create Admin Account</button>
    <div class="auth-switch">Already have access? <a href="admin-login.html">Log in</a></div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
applyTheme();

async function signupAdmin() {
  const name = val(document.getElementById('as-name').value);
  const email = document.getElementById('as-email').value.trim();
  const pass = document.getElementById('as-pass').value;
  if (!name || !email || !pass) { showErr('as-error', 'Please fill in all fields'); return; }
  if (pass.length < 6) { showErr('as-error', 'Password must be at least 6 characters'); return; }
  setLoading('as-btn', true, 'Create Admin Account');
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) { setLoading('as-btn', false, 'Create Admin Account'); showErr('as-error', error.message); return; }
  let avatar_url = null;
  const f = document.getElementById('as-avatar-file').files[0];
  if (f) { try { avatar_url = await uploadFile('avatars', `admins/${data.user.id}`, f); } catch(e) {} }
  await sb.from('profiles').upsert({
    id: data.user.id, name, phone: '', location: '', role: 'admin', avatar_url, status: 'active', created_at: new Date().toISOString()
  });
  setLoading('as-btn', false, 'Create Admin Account');
  window.location.href = 'admin-dashboard.html';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}
function setLoading(btnId, on, originalText) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Please wait…' : originalText;
}
</script>
<div id="toast" class="toast"></div>
</body>
</html>
