<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Login – FreshFetch</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="page auth-page farmer-auth active">
  <div class="auth-card">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <div class="auth-logo">
      <div class="auth-logo-icon"><img src="../images/logo.png" onerror="this.parentElement.innerHTML='🌾'"></div>
      <div class="auth-logo-text">FreshFetch</div>
    </div>
    <div class="auth-title">Farmer Login 🚜</div>
    <div class="auth-sub">Connect your crops to thousands of buyers</div>
    <div id="fl-error" class="error-msg"></div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="input-prefix"><span class="prefix-label">+256</span><input type="tel" id="fl-phone" placeholder="700 000 000" maxlength="9"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="fl-pass" placeholder="Enter your password" onkeydown="if(event.key==='Enter')loginFarmer()">
    </div>
    <button class="btn-primary" id="fl-btn" onclick="loginFarmer()">Log In as Farmer</button>
    <div class="auth-switch">New farmer? <a href="farmer-signup.html">Register your farm</a></div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
applyTheme();

window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    if (data && data.role === 'farmer') window.location.href = 'farmer-dashboard.html';
  }
});

async function loginFarmer() {
  const rawPhone = document.getElementById('fl-phone').value.trim();
  const pass = document.getElementById('fl-pass').value;
  if (!rawPhone || !pass) { showErr('fl-error', 'Please fill in all fields'); return; }
  setLoading('fl-btn', true, 'Log In as Farmer');
  const email = rawPhone.replace(/\s/g,'') + '@farmer.freshfetch.ug';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoading('fl-btn', false, 'Log In as Farmer');
  if (error) { showErr('fl-error', 'Invalid phone number or password'); return; }
  window.location.href = 'farmer-dashboard.html';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}
function setLoading(btnId, on, originalText) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Please wait…' : originalText;
}
</script>
<div id="toast" class="toast"></div>
</body>
</html>
