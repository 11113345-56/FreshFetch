<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – FreshFetch</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="page auth-page active">
  <div class="auth-card">
    <button class="back-btn" onclick="location.href='../index.html'">← Back</button>
    <div class="auth-logo">
      <div class="auth-logo-icon" style="background:linear-gradient(135deg,#7c3aed,#a78bfa)"><span>🔐</span></div>
      <div class="auth-logo-text" style="background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Admin Portal</div>
    </div>
    <div class="auth-title">Admin Login</div>
    <div class="auth-sub">Manage the FreshFetch platform</div>
    <div id="al-error" class="error-msg"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="al-email" type="email" placeholder="admin@freshfetch.ug" onkeydown="if(event.key==='Enter')loginAdmin()"></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="al-pass" type="password" placeholder="Admin password" onkeydown="if(event.key==='Enter')loginAdmin()"></div>
    <button class="btn-primary purple" id="al-btn" onclick="loginAdmin()">Access Admin Panel</button>
    <div class="auth-switch">No account? <a href="admin-signup.html">Create admin account</a></div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
applyTheme();

async function loginAdmin() {
  const email = document.getElementById('al-email').value.trim();
  const pass = document.getElementById('al-pass').value;
  if (!email || !pass) { showErr('al-error', 'Please fill in all fields'); return; }
  setLoading('al-btn', true, 'Access Admin Panel');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoading('al-btn', false, 'Access Admin Panel');
  if (error) { showErr('al-error', 'Invalid credentials'); return; }
  window.location.href = 'admin-dashboard.html';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}
function setLoading(btnId, on, originalText) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Please wait…' : originalText;
}
</script>
<div id="toast" class="toast"></div>
</body>
</html>
